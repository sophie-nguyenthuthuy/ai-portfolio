# Default configuration consumed by mlops.config.Settings.
# Environment variables prefixed with MLOPS_ override these values.

app_name: mlops-platform
model_name: churn-reference
log_level: INFO

# data
data_path: data/reference.csv
synthetic_rows: 4000
random_seed: 42
test_size: 0.2

# model: gradient_boosting | logistic_regression
classifier: gradient_boosting

# orchestration: base (built-in DAG runner) | prefect (optional dep)
pipeline_backend: base
min_roc_auc: 0.7

# registry: local (versioned joblib + manifest) | mlflow (optional dep)
registry_backend: local
registry_dir: registry

# mlflow (optional path)
mlflow_tracking_uri: ./mlruns
mlflow_experiment: mlops-platform

# monitoring
drift_threshold: 0.25

# api
api_host: 0.0.0.0
api_port: 8000
