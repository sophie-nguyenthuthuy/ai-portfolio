# Scheduled retraining + drift check.
# Runs the full reference flow nightly: ingest -> validate -> train -> evaluate
# -> register -> deploy-check (auto-promotes to Production if the metric floor
# is met), then runs the PSI drift monitor.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mlops-retrain
  labels:
    app: mlops-api
    component: scheduled-retrain
spec:
  schedule: "0 2 * * *"        # 02:00 daily
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app: mlops-api
            component: scheduled-retrain
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
          containers:
            - name: retrain
              image: capstone-mlops:latest
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "-c"]
              args:
                - |
                  python -m mlops.pipeline run && \
                  python monitoring/drift.py --prometheus
              envFrom:
                - configMapRef:
                    name: mlops-config
              resources:
                requests:
                  cpu: "250m"
                  memory: "512Mi"
                limits:
                  cpu: "1"
                  memory: "1Gi"
              volumeMounts:
                - name: registry
                  mountPath: /app/registry
          volumes:
            - name: registry
              persistentVolumeClaim:
                claimName: mlops-registry
