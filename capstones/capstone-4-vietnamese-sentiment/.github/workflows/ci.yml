name: capstone-4-vietnamese-sentiment CI

on:
  push:
    paths:
      - "capstones/capstone-4-vietnamese-sentiment/**"
  pull_request:
    paths:
      - "capstones/capstone-4-vietnamese-sentiment/**"

defaults:
  run:
    working-directory: capstones/capstone-4-vietnamese-sentiment

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (base + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests monitoring

      - name: Pytest (offline)
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t capstone-4-vietnamese-sentiment:ci .
