name: capstone-churn

services:
  api:
    build: .
    image: capstone-churn:latest
    ports:
      - "8000:8000"
    environment:
      CHURN_MLFLOW_TRACKING_URI: http://mlflow:5000
      CHURN_MODEL_DIR: /app/models
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      - mlflow
    networks:
      - churn-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri /mlruns
      --default-artifact-root /mlruns
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    networks:
      - churn-net

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - churn-net

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/churn.json:ro
    depends_on:
      - prometheus
    networks:
      - churn-net

networks:
  churn-net:
    driver: bridge
