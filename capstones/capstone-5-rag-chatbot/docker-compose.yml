name: capstone-rag

services:
  api:
    build: .
    image: capstone-rag:latest
    ports:
      - "8000:8000"
    environment:
      # Switch to the optional backends by uncommenting these.
      # RAGBOT_VECTOR_STORE: qdrant
      # RAGBOT_QDRANT_URL: http://qdrant:6333
      # RAGBOT_LLM: ollama
      # RAGBOT_OLLAMA_BASE_URL: http://ollama:11434
      RAGBOT_LOG_LEVEL: INFO
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      - qdrant
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    networks:
      - rag-net

  ollama:
    image: ollama/ollama:0.1.48
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - rag-net

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - rag-net

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/rag.json:ro
    depends_on:
      - prometheus
    networks:
      - rag-net

volumes:
  ollama_models:

networks:
  rag-net:
    driver: bridge
