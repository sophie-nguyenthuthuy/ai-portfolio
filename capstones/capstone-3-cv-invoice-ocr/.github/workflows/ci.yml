name: capstone-3-cv-invoice-ocr CI

on:
  push:
    paths:
      - "capstones/capstone-3-cv-invoice-ocr/**"
  pull_request:
    paths:
      - "capstones/capstone-3-cv-invoice-ocr/**"

defaults:
  run:
    working-directory: capstones/capstone-3-cv-invoice-ocr

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (base + dev only — no torch/ocr)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests monitoring

      - name: Import check (base deps only)
        run: python -c "import vision; print(vision.__version__)"

      - name: Tests (offline)
        run: python -m pytest -q

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t capstone-3-cv-invoice-ocr:ci .
