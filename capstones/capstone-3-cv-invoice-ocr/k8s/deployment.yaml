apiVersion: apps/v1
kind: Deployment
metadata:
  name: cv-invoice-ocr
  labels:
    app: cv-invoice-ocr
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cv-invoice-ocr
  template:
    metadata:
      labels:
        app: cv-invoice-ocr
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: api
          image: capstone-3-cv-invoice-ocr:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: cv-invoice-ocr-config
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
