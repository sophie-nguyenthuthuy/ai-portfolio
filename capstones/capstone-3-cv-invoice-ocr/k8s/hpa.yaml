apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cv-invoice-ocr
  labels:
    app: cv-invoice-ocr
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cv-invoice-ocr
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
