name: capstone-6-research-agent CI

on:
  push:
    paths:
      - "capstones/capstone-6-research-agent/**"
  pull_request:
    paths:
      - "capstones/capstone-6-research-agent/**"

defaults:
  run:
    working-directory: capstones/capstone-6-research-agent

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests monitoring

      - name: Pytest
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t capstone-research-agent:ci .
